version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: urltrim-postgres
    environment:
      POSTGRES_USER: urltrim
      POSTGRES_PASSWORD: urltrim
      POSTGRES_DB: urltrim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: urltrim-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: urltrim-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: {}

